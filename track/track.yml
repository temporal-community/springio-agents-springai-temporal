title: Building Durable AI Agents with Spring AI + Temporal
teaser: See how Temporal turns a fragile AI agentic loop into a production-grade,
  fault-tolerant workflow — step by step, in running Java code.
description: |-
  A hands-on workshop from Spring I/O 2025 Barcelona. Four progressive demos show how to integrate Spring AI with Temporal to build durable AI agents.

  **What you'll see:**

  - **Demo 1 – Agentic Loop from Scratch:** A manual agentic loop as a Temporal workflow — LLM calls and tool executions are individual activities, visible and retryable in the Temporal UI.
  - **Demo 2 – Spring AI Integration Library:** The same loop, collapsed to a single line using the `temporal-spring-ai` library. Spring AI handles the loop; Temporal handles durability.
  - **Demo 3 – MCP Tooling:** (Instructor demo) Extends the agent with F1 race data via an MCP server, chained with live weather data.
  - **Demo 4 – Human in the Loop:** The agent pauses mid-execution to ask the user a question, durably waiting for a signal before continuing.

  All demos run inside this environment. The Temporal dev server, the proxy network control panel, and all dependencies are pre-installed.

  **Prerequisites:** Familiarity with Java and Spring Boot. No prior Temporal experience required.
