# ABOUTME: Spring Boot + Temporal configuration for the agentic loop demo.
# The temporal-spring-boot-starter reads the temporal section to auto-configure the worker.

spring:
  main:
    web-application-type: none
    banner-mode: off
  ai:
    retry:
      max-attempts: 1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514

  temporal:
    namespace: default
    connection:
      target: localhost:7233
    workers:
      - task-queue: agent-task-queue
        workflow-classes:
          - io.temporal.ai.workshop.AgentWorkflowImpl
        activity-beans:
          - chatModelActivity
          - toolActivitiesImpl
